<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MFTracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/main.css" rel="stylesheet">
</head>
<body class="login-body">
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-icon brand-icon-lg"><i class="bi bi-graph-up-arrow"></i></div>
      <h1 class="brand-name mt-3">MF<span class="brand-accent">Tracker</span></h1>
      <p class="login-subtitle">Mutual Fund Investment Intelligence</p>
    </div>
    {% if form.errors %}
    <div class="alert mft-toast" data-level="error" role="alert">
      <i class="bi bi-x-circle-fill me-2"></i>Invalid username or password.
    </div>
    {% endif %}
    <form method="post" class="login-form">
      {% csrf_token %}
      <div class="form-group mb-3">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person input-icon"></i>
          <input type="text" name="username" class="form-control mft-input" placeholder="Enter username" autofocus required>
        </div>
      </div>
      <div class="form-group mb-4">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" name="password" class="form-control mft-input" placeholder="Enter password" required>
        </div>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn mft-btn-primary w-100">
        <i class="bi bi-arrow-right-circle me-2"></i>Sign In
      </button>
    </form>
    <p class="login-hint mt-3 text-center">
      <small>Use Django admin to create user accounts</small>
    </p>
  </div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
